spring.application.name=event-gateway
account-service.url=http://localhost:8081

server.port=8080

spring.datasource.url=jdbc:h2:mem:gatewaydb;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=password
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.jpa.hibernate.ddl-auto=update

management.endpoints.web.base-path=/
# health is implemented by our own HealthController (DB-aware); only expose metrics/prometheus here
management.endpoints.web.exposure.include=metrics,prometheus

resilience4j.retry.instances.accountService.max-attempts=2
resilience4j.retry.instances.accountService.wait-duration=200ms
resilience4j.retry.instances.accountService.enable-exponential-backoff=true
resilience4j.retry.instances.accountService.exponential-backoff-multiplier=2
resilience4j.retry.instances.accountService.enable-randomized-wait=true
resilience4j.retry.instances.accountService.randomized-wait-factor=0.5
resilience4j.retry.instances.accountService.retry-exceptions=com.charlesSchwab.event_gateway.exception.AccountServiceUnavailableException

resilience4j.ratelimiter.instances.eventSubmission.limit-for-period=5
resilience4j.ratelimiter.instances.eventSubmission.limit-refresh-period=1s
resilience4j.ratelimiter.instances.eventSubmission.timeout-duration=0

resilience4j.circuitbreaker.instances.accountService.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.accountService.sliding-window-size=10
resilience4j.circuitbreaker.instances.accountService.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.accountService.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.accountService.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.accountService.permitted-number-of-calls-in-half-open-state=2

management.tracing.sampling.probability=1.0
management.otlp.tracing.endpoint=${OTLP_TRACING_ENDPOINT:http://localhost:4318/v1/traces}
